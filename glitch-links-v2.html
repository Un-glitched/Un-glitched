<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glitch Links</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #080808;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    flex-direction: column;
    gap: 16px;
    padding: 60px 40px;
  }

  .glitch-link {
    position: relative;
    display: flex;
    align-items: center;
    gap: 14px;
    width: 260px;
    padding: 14px 22px;
    text-decoration: none;
    color: #e0e0e0;
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    border: 1px solid rgba(255, 0, 85, 0.25);
    background: rgba(255,0,85,0.03);
    cursor: pointer;
    overflow: hidden;
    transition: border-color 0.1s, background 0.1s;
    user-select: none;
  }

  /* Red sweep fill on hover */
  .glitch-link::before {
    content: '';
    position: absolute;
    inset: 0;
    background: #FF0055;
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0s;
    z-index: 0;
  }

  .glitch-link:hover::before {
    transform: scaleX(1);
    transition: transform 0.25s cubic-bezier(0.76, 0, 0.24, 1);
  }

  .glitch-link:hover {
    border-color: #FF0055;
    color: #fff;
  }

  /* Glitch slices — pseudo text layer */
  .glitch-link .glitch-a,
  .glitch-link .glitch-b {
    position: absolute;
    left: 22px;
    top: 0;
    height: 100%;
    display: flex;
    align-items: center;
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding-left: 29px;
    opacity: 0;
    pointer-events: none;
    z-index: 2;
    white-space: nowrap;
  }

  .glitch-link .glitch-a {
    color: #00fff0;
    clip-path: polygon(0 20%, 100% 20%, 100% 45%, 0 45%);
  }

  .glitch-link .glitch-b {
    color: #fff200;
    clip-path: polygon(0 60%, 100% 60%, 100% 82%, 0 82%);
  }

  .glitch-link:hover .glitch-a {
    animation: ga 0.45s steps(1) infinite;
  }
  .glitch-link:hover .glitch-b {
    animation: gb 0.45s steps(1) infinite 0.07s;
  }

  @keyframes ga {
    0%   { opacity:1; transform: translate(-4px,0) skewX(-8deg); }
    20%  { opacity:0; }
    35%  { opacity:1; transform: translate(4px,1px) skewX(5deg); }
    55%  { opacity:0; }
    70%  { opacity:1; transform: translate(-2px,0); }
    90%  { opacity:0; }
    100% { opacity:0; }
  }

  @keyframes gb {
    0%   { opacity:1; transform: translate(3px,-1px); }
    25%  { opacity:0; }
    40%  { opacity:1; transform: translate(-3px,0) skewX(6deg); }
    60%  { opacity:0; }
    75%  { opacity:1; transform: translate(2px,1px); }
    95%  { opacity:0; }
    100% { opacity:0; }
  }

  .glitch-link svg {
    width: 16px;
    height: 16px;
    fill: currentColor;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
  }

  .glitch-link .label {
    position: relative;
    z-index: 1;
    flex: 1;
  }

  /* corner brackets */
  .c { position: absolute; width: 7px; height: 7px; border-color: #FF0055; border-style: solid; transition: all 0.2s; z-index: 3; }
  .c.tl { top:-1px; left:-1px; border-width: 2px 0 0 2px; }
  .c.br { bottom:-1px; right:-1px; border-width: 0 2px 2px 0; }
  .glitch-link:hover .c { width:11px; height:11px; }

  /* scanlines */
  .glitch-link:hover::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px, transparent 2px,
      rgba(0,0,0,0.12) 2px, rgba(0,0,0,0.12) 4px
    );
    pointer-events: none;
    z-index: 2;
  }

  /* active press */
  .glitch-link:active {
    transform: scale(0.97);
    filter: brightness(1.3);
  }

  /* CRT page overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px, transparent 3px,
      rgba(0,0,0,0.07) 3px, rgba(0,0,0,0.07) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }
</style>
</head>
