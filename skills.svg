<polyline points="20,10 20,30 40,30" fill="none" stroke="#ff0055" stroke-width="1.5" opacity="0.6"/>
<polyline points="780,10 780,30 760,30" fill="none" stroke="#ff0055" stroke-width="1.5" opacity="0.6"/>
<polyline points="20,310 20,290 40,290" fill="none" stroke="#ff0055" stroke-width="1.5" opacity="0.6"/>
<polyline points="780,310 780,290 760,290" fill="none" stroke="#ff0055" stroke-width="1.5" opacity="0.6"/>

</svg>
