  <text x="660" y="248" font-family="monospace" font-size="10" fill="#ff0055">CURIOUS</text>
  <line x1="40" y1="258" x2="760" y2="258" stroke="#1a1a1a" stroke-width="0.5"/>
</g>

<!-- bottom status -->
<text x="40" y="290" font-family="monospace" font-size="9" fill="#2a2a2a">$ status :: 0xDEAD::CORRUPT? NO. STILL COMPILING...</text>
<text x="40" y="308" font-family="monospace" font-size="9" fill="#222">$ next_target :: Deep Learning · Computer Vision · Systems Programming</text>

