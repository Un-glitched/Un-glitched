  <g class="glB" opacity="0.4"><text x="42" y="208" font-family="monospace" font-size="13" font-weight="700" fill="#00ffff">3D Design</text></g>
  <g class="glA" opacity="0.4"><text x="42" y="208" font-family="monospace" font-size="13" font-weight="700" fill="#ff0055">3D Design</text></g>
  <text x="40" y="208" font-family="monospace" font-size="13" font-weight="700" fill="#fff" class="flicker">3D Design</text>
