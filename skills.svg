  <text x="40" y="248" font-family="monospace" font-size="13" font-weight="700" fill="#fff" class="flicker">Cybersecurity</text>
  <g class="dg">
    <circle cx="500" cy="242" r="5" fill="#ff0055"/><circle cx="516" cy="242" r="5" fill="#ff0055"/>
    <circle cx="532" cy="242" r="5" fill="none" stroke="#333" stroke-width="1"/>
    <circle cx="548" cy="242" r="5" fill="none" stroke="#333" stroke-width="1"/>
    <circle cx="564" cy="242" r="5" fill="none" stroke="#333" stroke-width="1"/>
    <circle cx="580" cy="242" r="5" fill="none" stroke="#333" stroke-width="1"/>
    <circle cx="596" cy="242" r="5" fill="none" stroke="#333" stroke-width="1"/>
    <circle cx="612" cy="242" r="5" fill="none" stroke="#333" stroke-width="1"/>
    <circle cx="628" cy="242" r="5" fill="none" stroke="#333" stroke-width="1"/>
    <circle cx="644" cy="242" r="5" fill="none" stroke="#333" stroke-width="1"/>
