  <text x="40" y="168" font-family="monospace" font-size="13" font-weight="700" fill="#fff" class="flicker">Machine Learning</text>
  <g class="dg">
    <circle cx="500" cy="162" r="5" fill="#ff0055"/><circle cx="516" cy="162" r="5" fill="#ff0055"/>
    <circle cx="532" cy="162" r="5" fill="#ff0055"/>
    <circle cx="548" cy="162" r="5" fill="none" stroke="#333" stroke-width="1"/>
    <circle cx="564" cy="162" r="5" fill="none" stroke="#333" stroke-width="1"/>
    <circle cx="580" cy="162" r="5" fill="none" stroke="#333" stroke-width="1"/>
    <circle cx="596" cy="162" r="5" fill="none" stroke="#333" stroke-width="1"/>
    <circle cx="612" cy="162" r="5" fill="none" stroke="#333" stroke-width="1"/>
    <circle cx="628" cy="162" r="5" fill="none" stroke="#333" stroke-width="1"/>
    <circle cx="644" cy="162" r="5" fill="none" stroke="#333" stroke-width="1"/>
  </g>
  <text x="660" y="168" font-family="monospace" font-size="10" fill="#ff0055">LEARNING</text>
  <line x1="40" y1="178" x2="760" y2="178" stroke="#1a1a1a" stroke-width="0.5"/>
</g>

<!-- ROW 4: 3D Design -->
