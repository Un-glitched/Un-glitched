    <circle cx="500" cy="202" r="5" fill="#ff0055"/><circle cx="516" cy="202" r="5" fill="#ff0055"/>
    <circle cx="532" cy="202" r="5" fill="#ff0055"/><circle cx="548" cy="202" r="5" fill="#ff0055"/>
    <circle cx="564" cy="202" r="5" fill="#ff0055"/><circle cx="580" cy="202" r="5" fill="#ff0055"/>
    <circle cx="596" cy="202" r="5" fill="#ff0055"/><circle cx="612" cy="202" r="5" fill="#ff0055"/>
    <circle cx="628" cy="202" r="5" fill="none" stroke="#333" stroke-width="1"/>
    <circle cx="644" cy="202" r="5" fill="none" stroke="#333" stroke-width="1"/>
  </g>
  <text x="660" y="208" font-family="monospace" font-size="10" fill="#ff0055">CREATING</text>
